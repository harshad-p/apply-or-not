<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apply or Not</title>
    <link rel="stylesheet" href="popup.css">
    <script src="popup.js" defer></script>
  </head>
  <body>
    <main class="popup-shell">
      <header class="brand">
        <span class="brand-mark" aria-hidden="true">A?</span>
        <span class="brand-name">Apply or Not</span>
        <span class="status-pill" data-settings-status>Checking setup</span>
      </header>

      <section class="empty-state" aria-labelledby="popup-title">
        <div class="score-placeholder" aria-hidden="true" data-result-mark>?</div>
        <p class="eyebrow" data-result-eyebrow>Job-fit check</p>
        <h1 id="popup-title" data-result-title>Should you apply?</h1>
        <p class="description" data-result-description>
          Open a job posting to get a score and an explanation based on your
          preferences.
        </p>

        <div class="button-stack">
          <button type="button" data-extract-button hidden>Read this job posting</button>
          <button class="secondary-button" type="button" data-settings-button>
            Set your preferences
          </button>
        </div>
        <p class="milestone-note" data-settings-note>
          Tell Apply or Not what you want from a role before analyzing job
          postings.
        </p>
      </section>

      <footer>
        <span>Nothing leaves your browser yet.</span>
        <span data-version></span>
      </footer>
    </main>
  </body>
</html>
